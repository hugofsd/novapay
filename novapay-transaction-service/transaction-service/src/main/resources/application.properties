spring.application.name=transaction-service
server.port=8082

# MySQL ? aponta para mysql-transaction (porta 3307, banco db_transaction)
# Porta diferente porque cada microserviço tem seu próprio MySQL isolado
spring.datasource.url=jdbc:mysql://localhost:3307/db_transaction?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=novapay
spring.datasource.password=novapay_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# validate: o Hibernate verifica se as tabelas existem mas não cria nada.
# Quem cria as tabelas é o Flyway pelo V1__.sql
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway roda as migrations na ordem V1, V2, V3... ao subir a aplicação
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka ? mesmo broker do account-service (porta 29092 externa do Docker)
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
