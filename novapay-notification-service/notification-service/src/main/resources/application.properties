spring.application.name=notification-service
server.port=8084

# MySQL ? mysql-notification container (porta 3309)
spring.datasource.url=jdbc:mysql://localhost:3309/db_notification?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=novapay
spring.datasource.password=novapay_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka ? broker compartilhado
spring.kafka.bootstrap-servers=localhost:29092

# Consumer: StringDeserializer para o valor (mesmo padr�o do fraud-service)
# JsonDeserializer deprecated no Spring Kafka 4.0 ? deserializa��o manual no consumer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

# Serializa LocalDateTime como string ISO-8601 (ex: "2026-03-20T10:30:00")
spring.jackson.serialization.write-dates-as-timestamps=false
