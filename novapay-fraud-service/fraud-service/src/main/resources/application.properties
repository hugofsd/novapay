# Nome aparece nos logs e health checks
spring.application.name=fraud-service

# Porta 8083 ? sequ�ncia NovaPay: account=8081, transaction=8082, fraud=8083
server.port=8083

# ?? MySQL ??????????????????????????????????????????????????????????????
# mysql-fraud container no docker-compose ? porta 3308 (externa)
# Banco isolado: nunca acessa db_transaction ou db_account diretamente
spring.datasource.url=jdbc:mysql://localhost:3308/db_fraud?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=novapay
spring.datasource.password=novapay_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# validate: Hibernate S� verifica se as tabelas existem, n�o cria nada
# Quem cria a tabela � o Flyway via V1__create_fraud_table.sql
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ?? Flyway ?????????????????????????????????????????????????????????????
# Roda V1, V2... em ordem ao iniciar o servi�o
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ?? Kafka ??????????????????????????????????????????????????????????????
# Mesmo broker do transaction-service (porta 29092 externa do Docker)
spring.kafka.bootstrap-servers=localhost:29092

# Producer: publica FraudDetectedEvent em "fraud-events" como JSON
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Consumer: StringDeserializer para o valor — deserialização feita manualmente no consumer
# Motivo: JsonDeserializer do Spring Kafka está deprecated desde a versão 4.0
# O ObjectMapper do Spring Boot (que tem JavaTimeModule) é injetado no TransactionEventConsumer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
